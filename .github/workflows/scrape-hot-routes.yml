name: Scrape Hot Routes (Tier A)

# Roda a cada 30 min em rotas populares.
# IPs dos runners Azure não são banidos pelas airlines (ao contrário de IP residencial).
#
# Configure os secrets no repo (Settings → Secrets → Actions):
#   BACKEND_WEBHOOK_URL    — https://seu-backend.com/api/v1/webhooks/scraper-result
#   BACKEND_WEBHOOK_SECRET — mesmo valor de SCRAPER_WEBHOOK_SECRET no backend .env

on:
  schedule:
    # A cada 30 min. GitHub Actions tem drift de até 15min — ok pra Tier A.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permite trigger manual via Actions UI
    inputs:
      origin:
        description: 'Origin IATA (override)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Matriz de 5 origens brasileiras principais — rodam em paralelo.
    # Cada job tira ~4 min, total ~20 min de compute por run.
    # 48 runs/dia × 20 min = 960 min/dia = 28.800 min/mês.
    # ⚠️ Em repo PRIVADO há limite de 2.000 min/mês — use repo PÚBLICO para ilimitado.
    # MODO DEBUG: só GRU com 2 destinos. Volta pra matriz 5×20 depois que extrair flights.
    strategy:
      fail-fast: false
      matrix:
        origin: [GRU]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '.github/scripts/package.json'

      - name: Install scraper deps
        working-directory: .github/scripts
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        working-directory: .github/scripts
        run: npx playwright install --with-deps chromium

      - name: Scrape Tier A destinations
        working-directory: .github/scripts
        env:
          BACKEND_WEBHOOK_URL: ${{ secrets.BACKEND_WEBHOOK_URL }}
          BACKEND_WEBHOOK_SECRET: ${{ secrets.BACKEND_WEBHOOK_SECRET }}
          DEBUG_DUMP_PAYLOADS: 'true'
          ORIGIN: ${{ matrix.origin }}
        run: |
          # MODO DEBUG — só 2 destinos pra iterar rápido.
          case "$ORIGIN" in
            GRU) DESTS="GIG,MIA";;
            GIG) DESTS="GRU,MIA";;
            BSB) DESTS="GRU,GIG";;
            CNF) DESTS="GRU,GIG";;
            SSA) DESTS="GRU,GIG";;
            *)   DESTS="GRU,GIG";;
          esac
          node scrape-routes.mjs "$ORIGIN" "$DESTS"

      - name: Upload debug payloads (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payloads-${{ matrix.origin }}
          path: /tmp/payload-*.json
          if-no-files-found: ignore
          retention-days: 3

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning ::Scrape failed for origin ${{ matrix.origin }}"
